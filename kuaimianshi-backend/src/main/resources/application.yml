spring:
  application:
    name: kuaimianshi-backend
  profiles:
    active: dev
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  session:
    timeout: 259200
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/mianshiya
    username: root
    password: wjl315698
# 端口配置
server:
  address: 0.0.0.0
  port: 8081
  servlet:
    context-path: /api
    session:
      cookie:
        max-age: 259200
# MyBatis-plus配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: false
    log-impl: org.apache.ibatis.logging.commons.JakartaCommonsLoggingImpl
  global-config:
    db-config:
      logic-delete-field: isDelete   #全局逻辑删除的实体字段名
      logic-delete-value: 1 #逻辑以删除（默认为1）
      logic-not-delete-value: 0 # 逻辑未删除（默认为0）
# 热key探测

